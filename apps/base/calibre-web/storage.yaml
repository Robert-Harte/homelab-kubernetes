apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-config-pvc
  labels:
    apps: calibre
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500MB
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-data-pvc
  labels:
    apps: calibre
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
